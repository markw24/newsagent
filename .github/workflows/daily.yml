# daily.yml — runs the daily briefing script every morning and publishes index.html

name: Daily Briefing

on:
  schedule:
    - cron: "0 13 * * *"  # 8 AM EST (UTC-5) every day
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily briefing script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python run.py

      - name: Commit and push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html — skipping commit."
          else
            git commit -m "Daily briefing: $(date -u '+%Y-%m-%d')"
            git push
          fi
